name: Build and Push Docker Images

# Coop 1.0 realignment: server/worker come from Roost's official GHCR images
# (ghcr.io/roostorg/coop-server, coop-worker) and migrations run via the official
# coop-server image — so we no longer build those from source. The ONLY image we
# build is our nginx-unprivileged coop-client (divine/coop-client-unprivileged),
# which re-serves Roost's official client assets under our restrictive K8s
# security context. See divine/coop-client-unprivileged/Dockerfile.

on:
  push:
    branches:
      - main
      - 'divine/*'
    paths:
      - 'divine/coop-client-unprivileged/**'
      - '.github/workflows/build-and-push.yaml'
    tags:
      - 'divine-v*'
  workflow_dispatch:   # manual rebuild to pick up new upstream client assets

env:
  REGISTRY: ghcr.io
  ORG: divinevideo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/coop-client
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=match,pattern=divine-v(.*),group=1
            type=match,pattern=divine-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./divine/coop-client-unprivileged
          file: divine/coop-client-unprivileged/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
